<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Semptify Documentation Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .doc-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            animation: slideUp 0.6s ease-out;
        }

        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .doc-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .doc-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .doc-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .doc-stats {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #555;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 120px;
        }

        .btn-view {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-view:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-copy {
            background: #FF9800;
            color: white;
        }

        .btn-copy:hover {
            background: #e68900;
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #666;
            background: none;
            border: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #000;
            background: #f0f0f0;
            border-radius: 50%;
        }

        .modal-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            padding-right: 40px;
        }

        .modal-body {
            color: #555;
            line-height: 1.8;
            font-size: 0.95em;
        }

        .modal-body h2 {
            font-size: 1.5em;
            color: #333;
            margin-top: 25px;
            margin-bottom: 12px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .modal-body h3 {
            font-size: 1.2em;
            color: #555;
            margin-top: 18px;
            margin-bottom: 10px;
        }

        .modal-body ul, .modal-body ol {
            margin-left: 25px;
            margin-bottom: 12px;
        }

        .modal-body li {
            margin-bottom: 8px;
        }

        .modal-body code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }

        .modal-body pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .modal-body pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .modal-body table th,
        .modal-body table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .modal-body table th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .modal-body table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .search-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        .filter-section {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: white;
        }

        .filter-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .quick-links {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .quick-links-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .quick-links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .quick-link {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
        }

        .quick-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .docs-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }

            .filter-section {
                margin-bottom: 20px;
            }

            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Semptify Documentation Hub</h1>
            <p>Quick access to all documentation and resources created today</p>
        </header>

        <div class="filter-section">
            <div class="filter-title">🔍 Filter by Type:</div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterDocs('all')">All</button>
                <button class="filter-btn" onclick="filterDocs('assessment')">Assessment</button>
                <button class="filter-btn" onclick="filterDocs('navigation')">Navigation</button>
            </div>
        </div>

        <div class="quick-links">
            <div class="quick-links-title">⚡ Quick Links</div>
            <div class="quick-links-grid">
                <a href="#" onclick="goToDoc('assessment'); return false;" class="quick-link">📊 Codebase Assessment</a>
                <a href="#" onclick="goToDoc('navigation'); return false;" class="quick-link">🗺️ Navigation Guide</a>
                <a href="/admin/gui_navigation_hub.html" class="quick-link">🎨 GUI Hub</a>
                <a href="/" class="quick-link">🏠 Home</a>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search documentation..." onkeyup="searchDocs()">
            <button class="search-btn" onclick="searchDocs()">Search</button>
        </div>

        <div class="docs-grid" id="docsGrid">
            <!-- Documentation cards will be generated here -->
        </div>

        <footer>
            <p>Semptify 5.0 Documentation Hub | Last updated: March 23, 2026</p>
        </footer>
    </div>

    <!-- View Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Documentation data
        const docs = [
            {
                id: 'assessment',
                title: 'Codebase Assessment',
                icon: '📊',
                type: 'assessment',
                description: 'Comprehensive analysis of Semptify 5.0 implementation vs original plans',
                highlights: ['96% implementation', 'A+ rating', '18 bonus features'],
                filename: 'CODEBASE_ASSESSMENT.md',
                url: '../../CODEBASE_ASSESSMENT.md',
                stats: {
                    'Features Implemented': '91 / 74+',
                    'Coverage': '96%',
                    'Bonus Features': '18',
                    'Rating': 'A+'
                }
            },
            {
                id: 'navigation',
                title: 'GUI Navigation Guide',
                icon: '🗺️',
                type: 'navigation',
                description: 'Complete reference guide for all 12 GUI pages and navigation structure',
                highlights: ['12 interfaces', '28+ settings', '40+ endpoints'],
                filename: 'GUI_NAVIGATION_GUIDE.md',
                url: '../../GUI_NAVIGATION_GUIDE.md',
                stats: {
                    'Total GUIs': '12',
                    'Configuration Settings': '28+',
                    'API Endpoints': '40+',
                    'Mobile Responsive': '100%'
                }
            }
        ];

        // Initialize
        function init() {
            renderDocs(docs);
        }

        // Render documentation cards
        function renderDocs(docsToRender) {
            const grid = document.getElementById('docsGrid');
            
            if (docsToRender.length === 0) {
                grid.innerHTML = '<div class="no-results">No documentation found matching your search.</div>';
                return;
            }

            grid.innerHTML = docsToRender.map(doc => `
                <div class="doc-card">
                    <div class="doc-icon">${doc.icon}</div>
                    <div class="doc-title">${doc.title}</div>
                    <div class="doc-description">${doc.description}</div>
                    
                    <div class="doc-stats">
                        ${Object.entries(doc.stats).map(([key, value]) => 
                            `<div class="stat-item"><span>${key}:</span><strong>${value}</strong></div>`
                        ).join('')}
                    </div>

                    <div class="button-group">
                        <button class="btn btn-view" onclick="viewDoc('${doc.id}')">
                            👁️ View
                        </button>
                        <button class="btn btn-download" onclick="downloadDoc('${doc.filename}')">
                            ⬇️ Download
                        </button>
                        <button class="btn btn-copy" onclick="copyLink('${doc.url}')">
                            🔗 Copy Link
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // View documentation in modal
        function viewDoc(docId) {
            const doc = docs.find(d => d.id === docId);
            if (!doc) return;

            fetch(doc.url)
                .then(response => response.text())
                .then(content => {
                    const modal = document.getElementById('viewModal');
                    const title = document.getElementById('modalTitle');
                    const body = document.getElementById('modalBody');

                    title.textContent = `${doc.icon} ${doc.title}`;
                    body.innerHTML = markdownToHtml(content);
                    modal.classList.add('active');
                })
                .catch(error => {
                    alert('Error loading documentation: ' + error);
                });
        }

        // Convert markdown to basic HTML
        function markdownToHtml(markdown) {
            let html = markdown
                // Headers
                .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
                .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
                .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
                // Bold and italic
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Code blocks
                .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>')
                // Inline code
                .replace(/`(.*?)`/g, '<code>$1</code>')
                // Links
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Lists
                .replace(/^\- (.*?)$/gm, '<li>$1</li>')
                .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
                // Line breaks
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            return '<p>' + html + '</p>';
        }

        // Close modal
        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        // Filter documentation
        function filterDocs(type) {
            // Update buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter and render
            if (type === 'all') {
                renderDocs(docs);
            } else {
                renderDocs(docs.filter(doc => doc.type === type));
            }
        }

        // Search documentation
        function searchDocs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = docs.filter(doc =>
                doc.title.toLowerCase().includes(query) ||
                doc.description.toLowerCase().includes(query) ||
                doc.highlights.some(h => h.toLowerCase().includes(query))
            );
            renderDocs(filtered);
        }

        // Go to specific doc
        function goToDoc(docId) {
            viewDoc(docId);
        }

        // Download documentation
        function downloadDoc(filename) {
            const url = `../../${filename}`;
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
        }

        // Copy link to clipboard
        function copyLink(url) {
            const fullUrl = window.location.origin + url;
            navigator.clipboard.writeText(fullUrl).then(() => {
                alert('Link copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy link');
            });
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('viewModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        };

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
