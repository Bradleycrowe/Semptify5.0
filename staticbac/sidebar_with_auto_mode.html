<script>
// Sidebar Auto Mode Panel Loader
document.addEventListener('DOMContentLoaded', function() {
  const panelContainer = document.getElementById('auto-mode-panel-container');
  
  if (panelContainer) {
    // Fetch and inject auto mode panel component
    fetch('/components/auto_mode_panel.html')
      .then(response => response.text())
      .then(html => {
        panelContainer.innerHTML = html;
        // Re-execute any scripts in the injected HTML
        panelContainer.querySelectorAll('script').forEach(script => {
          const newScript = document.createElement('script');
          newScript.textContent = script.textContent;
          document.body.appendChild(newScript);
        });
      })
      .catch(error => console.warn('Could not load auto mode panel:', error));
  }

  // Sidebar toggle functionality
  const toggleBtn = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('app-sidebar');
  
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      sidebar?.classList.toggle('collapsed');
    });
  }

  // Active link highlighting
  const links = document.querySelectorAll('.sidebar-link');
  const currentPath = window.location.pathname;
  
  links.forEach(link => {
    if (link.getAttribute('href') === currentPath) {
      link.classList.add('active');
    }
  });
});
</script>
